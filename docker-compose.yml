# ─────────────────────────────────────────────
#  Shared network
# ─────────────────────────────────────────────
networks:
  finsight-net:
    driver: bridge

# ─────────────────────────────────────────────
#  Named volumes 
# ─────────────────────────────────────────────
volumes:
  postgres-data: 
  airflow-logs:
  airflow-plugins:
# ─────────────────────────────────────────────
#  Services
# ─────────────────────────────────────────────
services:

  # ── 1. Zookeeper (required by Kafka) ────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: finsight-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - finsight-net
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 2. Kafka Broker ─────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: finsight-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "29092:29092"   
    networks:
      - finsight-net
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── 3. Postgres ──────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: finsight-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finsight}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finsight_pass}
      POSTGRES_DB: ${POSTGRES_DB:-finsight_db}
    ports:
      - "5432:5432"     
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - finsight-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finsight -d finsight_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 4. Kafka Producer ─────────
  producer:
    build:
      context: ./producer
      dockerfile: Dockerfile
    container_name: finsight-producer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC: ${KAFKA_TOPIC:-stock-prices}
      TICKERS: ${TICKERS:-AAPL,MSFT,GOOGL,TSLA}
      FETCH_INTERVAL_SECONDS: ${FETCH_INTERVAL_SECONDS:-60}
    env_file:
      - .env
    networks:
      - finsight-net
    restart: on-failure

  # ── 5. PySpark Job ────────────
  spark:
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: finsight-spark
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC: ${KAFKA_TOPIC:-stock-prices}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-finsight}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finsight_pass}
      POSTGRES_DB: ${POSTGRES_DB:-finsight_db}
    env_file:
      - .env
    networks:
      - finsight-net
    restart: on-failure

  # ── 6. FastAPI serving layer  ───
  api:
    build:
      context: .
      dockerfile: ./api/Dockerfile
    container_name: finsight-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-finsight}:${POSTGRES_PASSWORD:-finsight_pass}@postgres:5432/${POSTGRES_DB:-finsight_db}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    env_file:
      - .env
    ports:
      - "8000:8000"     
    networks:
      - finsight-net
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── 7. Airflow ────────
  airflow-init:
    build:
      context: ./orchestration/airflow
      dockerfile: Dockerfile
    container_name: finsight-airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-finsight}:${POSTGRES_PASSWORD:-finsight_pass}@postgres:5432/${POSTGRES_DB:-finsight_db}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _AIRFLOW_DB_UPGRADE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_USER:-admin}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_PASSWORD:-admin}
    entrypoint: /bin/bash
    command: -c "airflow db init && airflow users create --username $$_AIRFLOW_WWW_USER_USERNAME --password $$_AIRFLOW_WWW_USER_PASSWORD --firstname Admin --lastname User --role Admin --email admin@finsight.com"
    volumes:
      - ./orchestration/airflow/dags:/opt/airflow/dags
      - airflow-logs:/opt/airflow/logs
      - airflow-plugins:/opt/airflow/plugins
    networks:
      - finsight-net

  # ── 8. Airflow Webserver ─────────────────────
  airflow-webserver:
    build:
      context: ./orchestration/airflow
      dockerfile: Dockerfile
    container_name: finsight-airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-finsight}:${POSTGRES_PASSWORD:-finsight_pass}@postgres:5432/${POSTGRES_DB:-finsight_db}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    env_file:
      - .env
    ports:
      - "8080:8080"     
    volumes:
      - ./orchestration/airflow/dags:/opt/airflow/dags
      - airflow-logs:/opt/airflow/logs
      - airflow-plugins:/opt/airflow/plugins
    command: webserver
    networks:
      - finsight-net
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 20s
      timeout: 10s
      retries: 5

  # ── 9. Airflow Scheduler ─────────────────────
  airflow-scheduler:
    build:
      context: ./orchestration/airflow
      dockerfile: Dockerfile
    container_name: finsight-airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-finsight}:${POSTGRES_PASSWORD:-finsight_pass}@postgres:5432/${POSTGRES_DB:-finsight_db}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    env_file:
      - .env
    volumes:
      - ./orchestration/airflow/dags:/opt/airflow/dags
      - airflow-logs:/opt/airflow/logs
      - airflow-plugins:/opt/airflow/plugins
    command: scheduler
    networks:
      - finsight-net
    restart: on-failure


  # ── 10. Streamlit UI ─────────────────────────────────────────
  finsight-ui:
    build:
      context: ./ui
      dockerfile: Dockerfile.streamlit
    ports:
      - "8501:8501"
    depends_on:
      - api
    networks:
      - finsight-net
    restart: on-failure 